name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - run: gradle wrapper --gradle-version 8.2

      - run: chmod +x gradlew

      - run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: SalahApp-APK
          path: app/build/outputs/apk/release/*.apk

      - uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "محمد عبد العظيم - مواقيت الصلاة والأذكار - إصدار ${{ github.run_number }}"
          body: |
            ## تطبيق محمد عبد العظيم 🕌🤲
            ### المميزات:
            - 🕌 مواقيت الصلاة تلقائياً بالـ GPS
            - 📿 أذكار صوتية في الخلفية
            - 📖 أذكار الصباح والمساء مع مسبحة
            - 🔔 أذان لكل صلاة مع إمكانية اختيار الصوت
            - 🔕 إمكانية وضع الصامت لكل صلاة
            - 🖼️ تصميم جميل بصورة والدك
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
